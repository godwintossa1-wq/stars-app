name: XAS v33 - Auto Find App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Stars code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find Android project root
        id: findapp
        run: |
          echo "=== Repo structure ==="
          ls -la
          
          # Find the folder containing app/build.gradle.kts
          APP_ROOT=$(find . -type f -path "*/app/build.gradle.kts" -exec dirname {} \; | sed 's|/app$||' | head -n 1)
          
          if [ -z "$APP_ROOT" ]; then
            echo "ERROR: Cannot find app/build.gradle.kts"
            find . -name "build.gradle*" 
            exit 1
          fi
          
          echo "Found Android project at: $APP_ROOT"
          echo "PROJECT_ROOT=$APP_ROOT" >> $GITHUB_OUTPUT
          
          echo "=== App folder contents ==="
          ls -la "$APP_ROOT/app/src/main/java/"

      - name: Rename package com.example.stars → com.xas.app
        run: |
          cd ${{ steps.findapp.outputs.PROJECT_ROOT }}
          
          # 1. Create destination folder
          mkdir -p app/src/main/java/com/xas
          
          # 2. Move stars → com/xas/app
          mv app/src/main/java/com/example/stars app/src/main/java/com/xas/app
          
          # 3. Replace package names in all .kt files
          find app/src/main/java/com/xas/app -name "*.kt" -exec sed -i 's/package com.example.stars/package com.xas.app/g' {} +
          
          # 4. Update AndroidManifest.xml
          sed -i 's/package="com.example.stars"/package="com.xas.app"/' app/src/main/AndroidManifest.xml || true
          sed -i 's/android:label="Stars"/android:label="XAS"/' app/src/main/AndroidManifest.xml || true
          sed -i 's/@style\/Theme.Stars/@style\/Theme.XAS/g' app/src/main/AndroidManifest.xml || true
          
          # 5. Update build.gradle.kts
          sed -i 's/namespace = "com.example.stars"/namespace = "com.xas.app"/' app/build.gradle.kts || true
          sed -i 's/applicationId = "com.example.stars"/applicationId = "com.xas.app"/' app/build.gradle.kts || true
          
          echo "=== Renamed files ==="
          find app/src/main/java/com/xas/app -name "*.kt"

      - name: Build XAS APK
        run: |
          cd ${{ steps.findapp.outputs.PROJECT_ROOT }}
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload XAS APK
        uses: actions/upload-artifact@v4
        with:
          name: XAS-v33
          path: ${{ steps.findapp.outputs.PROJECT_ROOT }}/app/build/outputs/apk/debug/app-debug.apk
