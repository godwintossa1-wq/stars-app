name: XAS v27 - Real Stars App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip real Stars app
        run: |
          unzip download.zip
          echo "=== Unzipped structure ==="
          ls -R app/

      - name: Replace dummy with real source
        run: |
          # 1. Nuke the dummy MainActivity we used for v1-v24
          rm -rf app/src/main/java/com/xas/app/MainActivity.java || true
          
          # 2. Move real Stars code into project
          mv download/app/src/main/* app/src/main/
          
          # 3. Rename package com.example.stars → com.xas.app
          mv app/src/main/java/com/example/stars app/src/main/java/com/xas/app
          
          # 4. Find/replace package names in all .kt files
          find app/src/main/java/com/xas/app -name "*.kt" -exec sed -i 's/package com.example.stars/package com.xas.app/g' {} +
          
          # 5. Update AndroidManifest.xml
          sed -i 's/<manifest/<manifest package="com.xas.app"/' app/src/main/AndroidManifest.xml
          sed -i 's/android:label="Stars"/android:label="XAS"/' app/src/main/AndroidManifest.xml
          sed -i 's/@style\/Theme.Stars/@style\/Theme.XAS/g' app/src/main/AndroidManifest.xml || true
          
          # 6. Update build.gradle namespace
          sed -i 's/namespace "com.xas.app"/namespace "com.xas.app"/' app/build.gradle || true
          sed -i 's/applicationId "com.xas.app"/applicationId "com.xas.app"/' app/build.gradle
          
          echo "=== Final structure ==="
          find app/src/main/java/com/xas/app -name "*.kt"

      - name: Build XAS with real Stars code
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload XAS APK
        uses: actions/upload-artifact@v4
        with:
          name: XAS-v27-real-app
          path: app/build/outputs/apk/debug/app-debug.apk
