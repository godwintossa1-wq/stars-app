name: Build Stars AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Unzip project
      run: |
        unzip -o download.zip
        echo "=== FILES AFTER UNZIP ==="
        ls -la
        echo "=== LOOKING FOR GRADLEW ==="
        find . -name "gradlew" -type f
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Set project directory
      id: finddir
      run: |
        PROJECT_DIR=$(find . -name "gradlew" -type f -exec dirname {} \; | head -1)
        if [ -z "$PROJECT_DIR" ]; then
          echo "ERROR: gradlew not found anywhere in unzipped files"
          echo "Contents of current directory:"
          ls -la
          exit 1
        fi
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
        echo "Found gradlew in: $PROJECT_DIR"
      
    - name: Grant execute permission
      run: chmod +x ${{ steps.finddir.outputs.PROJECT_DIR }}/gradlew
      
    - name: Build Release AAB
      run: |
        cd ${{ steps.finddir.outputs.PROJECT_DIR }}
        ./gradlew bundleRelease
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: Stars-Release
        path: ${{ steps.finddir.outputs.PROJECT_DIR }}/app/build/outputs/bundle/release/app-release.aab
