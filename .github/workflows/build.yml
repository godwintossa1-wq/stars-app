name: Build Stars Release
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10
          
      - name: Create Gradle files if missing + Build
        run: |
          # If settings.gradle doesn't exist anywhere, make one
          if ! find . -name "settings.gradle*" -type f | grep -q .; then
            echo "No settings.gradle found. Creating it..."
            echo 'rootProject.name = "StarsApp"' > settings.gradle
            echo 'include ":app"' >> settings.gradle
          fi
          
          # If no root build.gradle, make a basic one
          if [ ! -f build.gradle ] && [ ! -f build.gradle.kts ]; then
            echo "Creating root build.gradle..."
            cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          fi
          
          # Find where to build from
          BUILD_DIR=$(find . -name "settings.gradle*" -type f -exec dirname {} \; | head -1)
          cd "$BUILD_DIR"
          echo "Building from: $BUILD_DIR"
          
          # Build it
          gradle assembleRelease bundleRelease
          
      - name: Upload whatever APK/AAB we made
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Stars-Release-Final
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
