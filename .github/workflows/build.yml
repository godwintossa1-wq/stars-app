name: Build Stars AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Unzip project
      run: unzip -o download.zip
      
    - name: Fix settings.gradle.kts
      run: |
        cat > settings.gradle.kts << 'EOF'
        rootProject.name = "Stars"
        include(":app")
        EOF
      
    - name: Fix root build.gradle.kts
      run: |
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        EOF
        
    - name: Fix app/build.gradle.kts
      run: |
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.example.stars"
            compileSdk = 34
        
            defaultConfig {
                applicationId = "com.example.stars"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled = false
                    proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_1_8
                targetCompatibility = JavaVersion.VERSION_1_8
            }
            kotlinOptions {
                jvmTarget = "1.8"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
        }
        EOF
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: '8.2'
        arguments: bundleRelease --stacktrace
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: Stars-Release
        path: app/build/outputs/bundle/release/app-release.aab
