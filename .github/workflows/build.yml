name: XAS v30 - Real Stars App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and locate Android app
        run: |
          unzip -o -q download.zip -d temp_stars
          
          echo "=== Finding Android project root ==="
          # Look for the folder that has both gradlew and app/build.gradle
          ANDROID_ROOT=$(find temp_stars -type f -name "gradlew" -exec dirname {} \; | head -n 1)
          
          if [ -z "$ANDROID_ROOT" ]; then
            echo "ERROR: Could not find gradlew in zip"
            find temp_stars -name "build.gradle" | head -5
            exit 1
          fi
          
          echo "Found Android project at: $ANDROID_ROOT"
          ls -la "$ANDROID_ROOT"
          
          # Copy the entire Android project to current directory
          cp -r "$ANDROID_ROOT"/* .
          cp -r "$ANDROID_ROOT"/.gitignore . 2>/dev/null || true
          
          echo "=== Confirming app/build.gradle exists ==="
          ls -la app/build.gradle

      - name: Replace dummy with real source
        run: |
          # 1. Nuke the dummy MainActivity
          rm -rf app/src/main/java/com/xas/app/MainActivity.java || true
          
          # 2. Create destination folder
          mkdir -p app/src/main/java/com/xas
          
          # 3. Check if com.example.stars exists before moving
          if [ -d "app/src/main/java/com/example/stars" ]; then
            mv app/src/main/java/com/example/stars app/src/main/java/com/xas/app
          else
            echo "WARNING: com.example.stars not found"
            find app/src/main/java -type d
          fi
          
          # 4. Replace package names in all .kt files
          find app/src/main/java -name "*.kt" -exec sed -i 's/package com.example.stars/package com.xas.app/g' {} + || true
          
          # 5. Update AndroidManifest.xml
          sed -i 's/package="com.example.stars"/package="com.xas.app"/' app/src/main/AndroidManifest.xml || true
          sed -i 's/android:label="Stars"/android:label="XAS"/' app/src/main/AndroidManifest.xml || true
          sed -i 's/@style\/Theme.Stars/@style\/Theme.XAS/g' app/src/main/AndroidManifest.xml || true
          
          # 6. Update build.gradle if it exists
          if [ -f "app/build.gradle" ]; then
            sed -i 's/namespace "com.example.stars"/namespace "com.xas.app"/' app/build.gradle || true
            sed -i 's/applicationId "com.example.stars"/applicationId "com.xas.app"/' app/build.gradle || true
          fi
          
          echo "=== Final package structure ==="
          find app/src/main/java -name "*.kt" | head -10

      - name: Build XAS with real Stars code
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload XAS APK
        uses: actions/upload-artifact@v4
        with:
          name: XAS-v30-real-app
          path: app/build/outputs/apk/debug/app-debug.apk
