name: Build Stars Release
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10
          
      - name: Create entire Android project if missing + Build
        run: |
          # Create root files if missing
          [ ! -f settings.gradle ] && echo 'rootProject.name = "StarsApp"\ninclude ":app"' > settings.gradle
          
          if [ ! -f build.gradle ] && [ ! -f build.gradle.kts ]; then
            cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          fi
          
          # Create /app module if missing - THIS is why assembleRelease failed
          mkdir -p app/src/main
          if [ ! -f app/build.gradle ]; then
            echo "Creating app/build.gradle..."
            cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.stars.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.stars.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              sourceSets {
                  main {
                      manifest.srcFile 'src/main/AndroidManifest.xml'
                      java.srcDirs = ['src/main/java']
                  }
              }
          }
          EOF
          fi
          
          # If there's no manifest, make a dummy one so it compiles
          if [ ! -f app/src/main/AndroidManifest.xml ]; then
            mkdir -p app/src/main/java/com/stars/app
            cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="XPA">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
            # Dummy activity so it compiles
            cat > app/src/main/java/com/stars/app/MainActivity.java << 'EOF'
          package com.stars.app;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) { super.onCreate(b); }
          }
          EOF
          fi
          
          echo "=== FILES WE HAVE ==="
          find . -name "*.gradle" -o -name "AndroidManifest.xml" | head -20
          
          gradle assembleRelease
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Stars-Release-v24
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
