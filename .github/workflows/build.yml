name: Build Stars Release
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10
          
      - name: Find project and build APK + AAB
        run: |
          PROJECT_DIR=$(find . -name "settings.gradle*" -type f -exec dirname {} \; | head -1)
          echo "Found Gradle project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleRelease bundleRelease
          
      - name: Find and upload APK/AAB
        run: |
          PROJECT_DIR=$(find . -name "settings.gradle*" -type f -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
      - uses: actions/upload-artifact@v4
        with:
          name: Stars-Release
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/app-release.apk
            ${{ env.PROJECT_DIR }}/app/build/outputs/bundle/release/app-release.aab
