name: Build XAS Release
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build XAS with Gradle 8.10
        run: |
          # Kill IDX's old Gradle 8.1 wrapper
          rm -rf gradle/ gradlew gradlew.bat
          
          # Create project files with XAS name
          printf 'rootProject.name = "XAS"\ninclude ":app"\n' > settings.gradle
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          # App module with XAS package + name
          mkdir -p app/src/main/java/com/xas/app
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.xas.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.xas.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF
          
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="XAS">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/java/com/xas/app/MainActivity.java << 'EOF'
          package com.xas.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) { 
                  super.onCreate(b);
                  TextView tv = new TextView(this);
                  tv.setText("XAS - We made it. 3:19am.");
                  tv.setTextSize(20);
                  tv.setPadding(40,200,40,40);
                  setContentView(tv);
              }
          }
          EOF
          
          # Install Gradle 8.10 to bypass IDX's 8.1 wrapper
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.10
          
          gradle assembleRelease
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XAS-Final-APK
          path: app/build/outputs/apk/release/*.apk
