name: Build Stars Release
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10
          
      - name: Create entire Android project if missing + Build
        run: |
          # Create root files - FIXED: use printf for proper newlines
          if [ ! -f settings.gradle ]; then
            printf 'rootProject.name = "StarsApp"\ninclude ":app"\n' > settings.gradle
          fi
          
          if [ ! -f build.gradle ] && [ ! -f build.gradle.kts ]; then
            cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          fi
          
          # Create /app module
          mkdir -p app/src/main/java/com/stars/app
          if [ ! -f app/build.gradle ]; then
            cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.stars.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.stars.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF
          fi
          
          # Dummy manifest + activity if missing
          if [ ! -f app/src/main/AndroidManifest.xml ]; then
            cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="XPA">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
            cat > app/src/main/java/com/stars/app/MainActivity.java << 'EOF'
          package com.stars.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) { 
                  super.onCreate(b);
                  TextView tv = new TextView(this);
                  tv.setText("XPA - Finally building at 3am");
                  setContentView(tv);
              }
          }
          EOF
          fi
          
          echo "=== VERIFY FILES ==="
          cat settings.gradle
          echo "---"
          ls -la app/
          
          gradle assembleRelease
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Stars-Release-v25
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
